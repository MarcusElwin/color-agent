name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # 1. Run the test suite. Tagging skips PR CI, so this is the last gate
  #    before bytes leave for PyPI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -m "not live" -ra

  # 2. Verify pyproject.toml version matches the git tag (vX.Y.Z -> X.Y.Z).
  verify-version:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag and pyproject version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG  pyproject=$PYPROJECT"
          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PYPROJECT" >&2
            exit 1
          fi

  # 3. Build sdist + wheel and upload as a workflow artifact so we can
  #    inspect / re-publish without rebuilding.
  build:
    needs: [test, verify-version]
    if: always() && needs.test.result == 'success' && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check distribution
        run: |
          pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 4. Publish to TestPyPI on workflow_dispatch with target=testpypi.
  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # 5. Publish to real PyPI on tag push, or workflow_dispatch with target=pypi.
  publish-pypi:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # 6. Create a GitHub Release with autogenerated notes.
  github-release:
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            dist/*
